<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CipherTool</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }

        .auth-card {
            background: linear-gradient(135deg, rgba(26, 31, 58, 0.8) 0%, rgba(10, 14, 39, 0.8) 100%);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 10px;
            padding: 2.5rem;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.3);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo {
            font-size: 3rem;
            color: #00d4ff;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .auth-title {
            color: #00ffff;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .auth-subtitle {
            color: #a8a8a8;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .auth-button {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .auth-footer {
            text-align: center;
            color: #a8a8a8;
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: #00d4ff;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .auth-footer a:hover {
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .password-requirements {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 5px;
            padding: 1rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: #a8a8a8;
        }

        .password-requirements li {
            margin: 0.3rem 0;
        }
    </style>
</head>
<body>
    <div id="alertContainer"></div>

    <div class="auth-container">
        <div class="auth-card animate-slide-in">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-user-shield"></i>
                </div>
                <h1 class="auth-title">CipherTool</h1>
                <p class="auth-subtitle">Secure Your Secrets with Military-Grade Encryption</p>
                <p style="color: #a8a8a8; font-size: 0.95rem; margin-top: 0.5rem;">Create your secure account</p>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Choose a username" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="At least 6 characters" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Re-enter your password" required>
                </div>

                <div class="password-requirements">
                    <strong style="color: #00ffff;">Password Requirements:</strong>
                    <ul style="margin-left: 1rem; margin-top: 0.5rem;">
                        <li>✓ At least 6 characters long</li>
                        <li>✓ Mix of uppercase and lowercase</li>
                        <li>✓ Include numbers and special characters</li>
                    </ul>
                </div>

                <button type="submit" class="btn btn-primary auth-button">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Login here</a>
            </div>

            <div class="auth-footer" style="margin-top: 1.5rem;">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            const success = await register(username, email, password, confirmPassword);
            if (success) {
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            }
        });
    </script>
</body>
</html>
