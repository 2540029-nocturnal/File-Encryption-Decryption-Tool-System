<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key Management - CipherTool</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo" onclick="goHome()" title="Go to Dashboard" style="cursor: pointer;">
                <i class="fas fa-lock logo-icon"></i>
                <span>CipherTool</span>
            </div>
            <nav>
                <button onclick="navigateTo('dashboard')" class="btn btn-secondary">Dashboard</button>
                <button onclick="logout()" class="btn btn-secondary">Logout</button>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <h1 style="color: #00ffff; margin-bottom: 2rem; font-size: 2rem;">
                <i class="fas fa-key"></i> Key Management
            </h1>

            
            <div class="card">
                <h2 style="color: #00ffff; margin-bottom: 1.5rem; font-size: 1.3rem;">
                    <i class="fas fa-plus-circle"></i> Generate New Key
                </h2>

                <form id="generateKeyForm">
                    <div class="form-group">
                        <label for="algorithm">Algorithm</label>
                        <select id="algorithm" required>
                            <option value="">-- Select Algorithm --</option>
                            <option value="caesar">Caesar Cipher</option>
                            <option value="xor">XOR Cipher</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="description">Key Description (Optional)</label>
                        <input type="text" id="description" placeholder="e.g., 'My backup key'">
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-random"></i> Generate Key
                    </button>
                </form>
            </div>

            
            <div class="card" style="margin-top: 2rem;">
                <h2 style="color: #00ffff; margin-bottom: 1.5rem; font-size: 1.3rem;">
                    <i class="fas fa-list"></i> Your Keys
                </h2>

                <div id="keysList">
                    <p style="color: #a8a8a8; text-align: center;">Loading keys...</p>
                </div>
            </div>
        </div>
    </main>

    <div id="alertContainer"></div>
    <script src="js/app.js"></script>
    <script>
        if (!isAuthenticated()) window.location.href = 'login.html';

        loadKeys();

        document.getElementById('generateKeyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const algorithm = document.getElementById('algorithm').value;
            const description = document.getElementById('description').value;

            const key = await generateNewKey(algorithm, description);
            if (key) {
                document.getElementById('generateKeyForm').reset();
                loadKeys();
            }
        });

        async function loadKeys() {
            const keys = await getAllKeys();
            const keysList = document.getElementById('keysList');

            if (!keys || keys.length === 0) {
                keysList.innerHTML = '<p style="color: #a8a8a8; text-align: center;">No keys found. Generate your first key!</p>';
                return;
            }

            let html = '<table><thead><tr><th>Key ID</th><th>Algorithm</th><th>Created</th><th>Description</th><th>Actions</th></tr></thead><tbody>';
            
            keys.forEach(key => {
                html += `
                    <tr>
                        <td><code style="color: #00d4ff;">${key.key_id}</code></td>
                        <td>${key.algorithm}</td>
                        <td>${formatDate(key.created_date)}</td>
                        <td>${key.description || '-'}</td>
                        <td>
                            <button onclick="copyKey('${key.key_id}')" class="btn" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;">Copy</button>
                            <button onclick="deleteKeyConfirm('${key.key_id}')" class="btn btn-danger" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;">Delete</button>
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            keysList.innerHTML = html;
        }

        function copyKey(keyId) {
            const keys = getAllKeys();
            const key = keys.find(k => k.key_id === keyId);
            if (key) copyToClipboard(key.key_value);
        }

        async function deleteKeyConfirm(keyId) {
            if (confirm('Are you sure you want to delete this key?')) {
                const success = await deleteKey(keyId);
                if (success) loadKeys();
            }
        }
    </script>
</body>
</html>
